<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadow Arena</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div id="character-select">
    <h1>Choose Your Fighter</h1>
    <button class="shade" onclick="chooseCharacter('Shade')">Shade - The Shadow Soldier</button>
    <button class="monk" onclick="chooseCharacter('Xiolin')">Xiolin - The Monk</button>
    <button class="alice" onclick="chooseCharacter('Alice')">Alice - The Snow Witch</button>
    <button class="home"><a href="./home.html">Back To Start</a></button>
  </div>

  <div id="game-container" style="display: none;">
    <div class="hud">
      <div class="player-hud" id="player1-hud">
        <img src="portraits/shade.png" class="portrait" id="p1-portrait">
        <div>
          <div class="bar-label">Player 1 - <span id="p1-name"></span></div>
          <div class="health-bar"><div id="p1-health" class="fill red"></div></div>
          <div class="ult-bar"><div id="p1-ult" class="fill blue"></div></div>
          <div>Status: <span id="p1-status">None</span></div>
        </div>
      </div>

      <div class="player-hud" id="player2-hud">
        <img src="portraits/xiolin.png" class="portrait" id="p2-portrait">
        <div>
          <div class="bar-label">Player 2 - <span id="p2-name"></span></div>
          <div class="health-bar"><div id="p2-health" class="fill red"></div></div>
          <div class="ult-bar"><div id="p2-ult" class="fill blue"></div></div>
          <div>Status: <span id="p2-status">None</span></div>
        </div>
      </div>
    </div>

    <h2 id="turn-message"></h2>

    <div id="animation-box">
      <video id="move-animation" width="400" height="250" autoplay muted></video>
    </div>

    <div id="battle-log"></div>

    <div id="player-actions">
      <button class="ability" onclick="openAbilityMenu()">Use Ability</button>
      <button class="ultimate" onclick="performAction('ultimate')">Ultimate</button>
      <button class="heal" onclick="performAction('item')">Item</button>
    </div>

    <div id="ability-menu" style="display: none;"></div>
  </div>
</body>
</html>
